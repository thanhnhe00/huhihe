# Server configuration
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/story_reading_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Cache configuration
spring.cache.type=simple
spring.cache.cache-names=trending

# Multipart upload limits (10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo-cloud}
cloudinary.api-key=${CLOUDINARY_API_KEY:1234567890}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:demo-secret}

# JWT Configuration
jwt.secret=${JWT_SECRET:841D394C381E48325E6A3B2F2A1C5F2D25232A2D2B2D2B242A2F2D2B212A2D2}
# JWT expiration (e.g. 24 hours)
jwt.expiration-ms=86400000
